<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TASK_SYS // 任务系统</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Scan-line overlay -->
  <div class="scanlines"></div>

  <div class="container">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-badge">TASK MANAGEMENT SYSTEM</div>
      <h1>任务系统</h1>
      <p class="header-sub">// PERSONAL MISSION CONTROL //</p>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%" data-empty="true"></div>
      </div>
      <div class="progress-meta">
        <span id="progress-text">0 / 0 COMPLETED</span>
        <span id="progress-pct">—</span>
      </div>
    </header>

    <!-- ── Clock Bar ── -->
    <div class="clock-bar">
      <div class="clock-segment">
        <div class="label">DATE</div>
        <div class="val" id="date-val">—</div>
      </div>
      <div class="clock-segment">
        <div class="label">TIME</div>
        <div class="val" id="time-val">—</div>
      </div>
      <div class="clock-segment">
        <div class="label">DAY</div>
        <div class="val" id="day-val">—</div>
      </div>
    </div>

    <!-- ── Input ── -->
    <div class="input-section">
      <div class="input-shell">
        <span class="input-tag">+ NEW</span>
        <input
          id="new-todo"
          type="text"
          placeholder="输入新任务，按 Enter 确认…"
          maxlength="200"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="add-btn" id="add-btn" title="添加任务">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <line x1="8" y1="1" x2="8" y2="15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="1" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Filter Tabs ── -->
    <div class="filter-strip">
      <button class="filter-btn active" data-filter="all">
        全部<span class="filter-count" id="cnt-all"></span>
      </button>
      <button class="filter-btn" data-filter="active">
        待完成<span class="filter-count" id="cnt-active"></span>
      </button>
      <button class="filter-btn" data-filter="done">
        已完成<span class="filter-count" id="cnt-done"></span>
      </button>
    </div>

    <!-- ── Task List ── -->
    <ul class="todo-list" id="todo-list"></ul>

    <!-- ── Empty State ── -->
    <div class="empty-state" id="empty-state" style="display:none">
      <span class="empty-glyph">NULL</span>
      <p class="empty-label">// NO TASKS LOADED · ADD ONE ABOVE //</p>
    </div>

    <!-- ── Footer ── -->
    <div class="list-footer" id="list-footer" style="display:none">
      <p class="footer-stat">
        <b id="remain-count">0</b>&nbsp;TASKS PENDING
      </p>
      <button class="clear-btn" id="clear-done">PURGE COMPLETED ×</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
